name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout nekte source (public)
        uses: actions/checkout@v4
        with:
          repository: nekte-protocol/nekte

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Build website
        working-directory: website
        run: pnpm build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

      - id: deployment
        uses: actions/deploy-pages@v4
